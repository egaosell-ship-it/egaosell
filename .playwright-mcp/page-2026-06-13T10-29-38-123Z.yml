                  - cell "Yes" [ref=e275]
                  - cell "A clear description of what the skill does and when to use it. This is what the agent sees when deciding whether to apply the skill." [ref=e276]
          - paragraph [ref=e278]: "Tip: Write your description in third person and include keywords that help the agent recognize when the skill is relevant. For example: \"Generates unit tests for Python code using pytest conventions.\""
          - heading "Skill folder structure" [level=2] [ref=e280]
          - paragraph [ref=e282]:
            - text: While
            - code [ref=e283]: SKILL.md
            - text: "is the only required file, you can include additional resources:"
          - generic [ref=e286]:
            - button "content_copy" [ref=e287] [cursor=pointer]
            - code [ref=e290]: ".agents/skills/my-skill/ ├─── SKILL.md # Main instructions (required) ├─── scripts/ # Helper scripts (optional) ├─── examples/ # Reference implementations (optional) └─── resources/ # Templates and other assets (optional)"
          - paragraph [ref=e292]: The agent can read these files when following your skill's instructions.
          - heading "How the agent uses skills" [level=2] [ref=e294]
          - paragraph [ref=e296]:
            - text: Skills follow a
            - strong [ref=e297]: progressive disclosure
            - text: "pattern:"
          - list [ref=e299]:
            - listitem [ref=e300]:
              - generic [ref=e301]:
                - strong [ref=e302]: Discovery
                - text: ":"
              - text: When a conversation starts, the agent sees a list of available skills with their names and descriptions
            - listitem [ref=e303]:
              - generic [ref=e304]:
                - strong [ref=e305]: Activation
                - text: ":"
              - generic [ref=e306]:
                - text: If a skill looks relevant to your task, the agent reads the full
                - code [ref=e307]: SKILL.md
                - text: content
            - listitem [ref=e308]:
              - generic [ref=e309]:
                - strong [ref=e310]: Execution
                - text: ":"
              - text: The agent follows the skill's instructions while working on your task
          - paragraph [ref=e312]: You don't need to explicitly tell the agent to use a skill—it decides based on context. However, you can mention a skill by name if you want to ensure it's used.
          - heading "Best practices" [level=2] [ref=e314]
          - heading "Keep skills focused" [level=3] [ref=e316]
          - paragraph [ref=e318]: Each skill should do one thing well. Instead of a "do everything" skill, create separate skills for distinct tasks.
          - heading "Write clear descriptions" [level=3] [ref=e320]
          - paragraph [ref=e322]: The description is how the agent decides whether to use your skill. Make it specific about what the skill does and when it's useful.
          - heading "Use scripts as black boxes" [level=3] [ref=e324]
          - paragraph [ref=e326]:
            - text: If your skill includes scripts, encourage the agent to run them with
            - code [ref=e327]: "--help"
            - text: first rather than reading the entire source code. This keeps the agent's context focused on the task.
          - heading "Include decision trees" [level=3] [ref=e329]
          - paragraph [ref=e331]: For complex skills, add a section that helps the agent choose the right approach based on the situation.
          - 'heading "Example: A code review skill" [level=2] [ref=e333]'
          - paragraph [ref=e335]: "Here's a simple skill that helps the agent review code:"
          - generic [ref=e338]:
            - button "content_copy" [ref=e339] [cursor=pointer]
            - code [ref=e342]: "--- name: code-review description: Reviews code changes for bugs, style issues, and best practices. Use when reviewing PRs or checking code quality. --- # Code Review Skill When reviewing code, follow these steps: ## Review checklist 1. **Correctness**: Does the code do what it's supposed to? 2. **Edge cases**: Are error conditions handled? 3. **Style**: Does it follow project conventions? 4. **Performance**: Are there obvious inefficiencies? ## How to provide feedback - Be specific about what needs to change - Explain why, not just what - Suggest alternatives when possible"
