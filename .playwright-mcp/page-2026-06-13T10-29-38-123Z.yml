          - heading "Agent Skills" [level=1] [ref=e179]
          - paragraph [ref=e181]:
            - text: Skills are an
            - link "open standard" [ref=e182] [cursor=pointer]:
              - /url: https://agentskills.io/home
            - text: for extending agent capabilities. A skill is a folder containing a
            - code [ref=e183]: SKILL.md
            - text: file with instructions that the agent can follow when working on specific tasks.
          - heading "What are skills?" [level=2] [ref=e185]
          - paragraph [ref=e187]: "Skills are reusable packages of knowledge that extend what the agent can do. Each skill contains:"
          - list [ref=e189]:
            - listitem [ref=e190]:
              - generic [ref=e191]:
                - strong [ref=e192]: Instructions
                - text: for how to approach a specific type of task
            - listitem [ref=e193]:
              - generic [ref=e194]:
                - strong [ref=e195]: Best practices
                - text: and conventions to follow
            - listitem [ref=e196]:
              - generic [ref=e197]:
                - strong [ref=e198]: Optional scripts and resources
                - text: the agent can use
          - paragraph [ref=e200]: When you start a conversation, the agent sees a list of available skills with their names and descriptions. If a skill looks relevant to your task, the agent reads the full instructions and follows them.
          - heading "Where skills live" [level=2] [ref=e202]
          - paragraph [ref=e204]: "Antigravity supports two types of skills:"
          - paragraph [ref=e206]:
            - table [ref=e207]:
              - rowgroup [ref=e208]:
                - row "Location Scope" [ref=e209]:
                  - columnheader "Location" [ref=e210]
                  - columnheader "Scope" [ref=e211]
              - rowgroup [ref=e212]:
                - row "<workspace-root>/.agents/skills/<skill-folder>/ Workspace-specific" [ref=e213]:
                  - cell "<workspace-root>/.agents/skills/<skill-folder>/" [ref=e214]:
                    - code [ref=e215]: <workspace-root>/.agents/skills/<skill-folder>/
                  - cell "Workspace-specific" [ref=e216]
                - row "~/.gemini/config/skills/<skill-folder>/ Global (all workspaces)" [ref=e217]:
                  - cell "~/.gemini/config/skills/<skill-folder>/" [ref=e218]:
                    - code [ref=e219]: ~/.gemini/config/skills/<skill-folder>/
                  - cell "Global (all workspaces)" [ref=e220]
          - paragraph [ref=e222]:
            - strong [ref=e223]: Workspace skills
            - text: are great for project-specific workflows, like your team's deployment process or testing conventions.
          - paragraph [ref=e225]:
            - strong [ref=e226]: Global skills
            - text: work across all your projects. Use these for personal utilities or general-purpose tools you want everywhere.
          - paragraph [ref=e228]: "Note: Antigravity now defaults to .agents/skills, but still maintains backward support for .agent/skills."
          - heading "Creating a skill" [level=2] [ref=e230]
          - paragraph [ref=e232]: "To create a skill:"
          - list [ref=e234]:
            - listitem [ref=e235]: Create a folder for your skill in one of the skill directories
            - listitem [ref=e236]:
              - generic [ref=e237]:
                - text: Add a
                - code [ref=e238]: SKILL.md
                - text: file inside that folder
          - generic [ref=e241]:
            - button "content_copy" [ref=e242] [cursor=pointer]
            - code [ref=e245]: .agents/skills/ └─── my-skill/ └─── SKILL.md
          - paragraph [ref=e247]:
            - text: Every skill needs a
            - code [ref=e248]: SKILL.md
            - text: "file with YAML frontmatter at the top:"
          - generic [ref=e251]:
            - button "content_copy" [ref=e252] [cursor=pointer]
            - code [ref=e255]: "--- name: my-skill description: Helps with a specific task. Use when you need to do X or Y. --- # My Skill Detailed instructions for the agent go here. ## When to use this skill - Use this when... - This is helpful for... ## How to use it Step-by-step guidance, conventions, and patterns the agent should follow."
          - heading "Frontmatter fields" [level=3] [ref=e257]
          - paragraph [ref=e259]:
            - table [ref=e260]:
              - rowgroup [ref=e261]:
                - row "Field Required Description" [ref=e262]:
                  - columnheader "Field" [ref=e263]
                  - columnheader "Required" [ref=e264]
                  - columnheader "Description" [ref=e265]
              - rowgroup [ref=e266]:
                - row "name No A unique identifier for the skill (lowercase, hyphens for spaces). Defaults to the folder name if not provided." [ref=e267]:
                  - cell "name" [ref=e268]:
