                  - cell "No" [ref=e270]
                  - cell "A unique identifier for the skill (lowercase, hyphens for spaces). Defaults to the folder name if not provided." [ref=e271]
                - row "description Yes A clear description of what the skill does and when to use it. This is what the agent sees when deciding whether to apply the skill." [ref=e272]:
                  - cell "description" [ref=e273]:
