<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>EgaoSell Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">EgaoSell 상품 수집기</h1>
    </div>

    <!-- 로그인 폼 (비로그인 시 표시) -->
    <div id="login-section" class="section hidden">
      <p class="description">크롤링 기능을 사용하려면<br>EgaoSell 로그인이 필요합니다.</p>
      <input type="email" id="email" placeholder="이메일 주소" />
      <input type="password" id="password" placeholder="비밀번호" />
      <button id="login-btn" class="btn primary">로그인</button>
      <div id="login-error" class="error-msg hidden"></div>
    </div>

    <!-- 로그인 완료 후 화면 -->
    <div id="main-section" class="section hidden">
      <div class="user-info">
        <span id="user-email"></span> 님 환영합니다.
        <button id="logout-btn" class="btn-text">로그아웃</button>
      </div>
      <p class="description">쿠팡, 스마트스토어 상품 페이지에서<br>아래 버튼을 눌러 상품을 수집하세요.</p>
      <button id="collect-btn" class="btn success">현재 페이지 상품 수집</button>
      <div id="collect-status" class="status-msg hidden"></div>
    </div>
    
    <!-- 초기 로딩 스피너 -->
    <div id="loading-section" class="section">
      <p>세션 확인 중...</p>
    </div>
  </div>

  <!-- CDN에서 다운로드한 supabase-js (UMD) 로드 -->
  <script src="lib/supabase.js"></script>
  <!-- 팝업 로직 로드 -->
  <script src="popup.js"></script>
</body>
</html>
