<body class="bg-surface text-on-surface min-h-screen">
<main class="w-full max-w-max-width mx-auto px-margin-mobile md:px-md py-lg md:py-xl">
<div class="mb-lg">
<button class="flex items-center text-secondary hover:text-primary transition-colors text-body-sm font-body-sm mb-sm group">
<span class="material-symbols-outlined text-[18px] mr-xs group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>

            </button>
<h1 class="text-headline-lg font-headline-lg">결제하기</h1>
</div>
<div class="flex flex-col lg:flex-row gap-gutter">
<div class="w-full lg:w-2/3 flex flex-col gap-md">
<section class="bg-surface-container-lowest border border-surface-variant rounded-xl p-md shadow-sm">
<h2 class="text-headline-sm font-headline-sm mb-md pb-xs border-b border-surface-variant">결제수단 선택</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-sm mb-md">
<label class="cursor-pointer relative border border-primary-container rounded-lg p-sm flex flex-col items-center justify-center gap-xs bg-surface hover:bg-surface-container-low transition-colors">
<input checked="" class="sr-only peer" name="payment_method" type="radio" value="card"/>
<span class="material-symbols-outlined text-[24px] text-primary" data-icon="credit_card">credit_card</span>
<span class="text-label-md font-label-md text-on-surface">신용/체크카드</span>
<div class="absolute top-xs right-xs hidden peer-checked:block text-primary">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
</label>
<label class="cursor-pointer relative border border-surface-variant rounded-lg p-sm flex flex-col items-center justify-center gap-xs bg-surface-container-lowest hover:bg-surface-container-low transition-colors">
<input class="sr-only peer" name="payment_method" type="radio" value="easy"/>
<span class="material-symbols-outlined text-[24px] text-secondary" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="text-label-md font-label-md text-on-surface">간편결제 (Toss)</span>
<div class="absolute top-xs right-xs hidden peer-checked:block text-primary">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
</label>
<label class="cursor-pointer relative border border-surface-variant rounded-lg p-sm flex flex-col items-center justify-center gap-xs bg-surface-container-lowest hover:bg-surface-container-low transition-colors">
<input class="sr-only peer" name="payment_method" type="radio" value="transfer"/>
<span class="material-symbols-outlined text-[24px] text-secondary" data-icon="account_balance">account_balance</span>
<span class="text-label-md font-label-md text-on-surface">계좌이체</span>
<div class="absolute top-xs right-xs hidden peer-checked:block text-primary">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
</label>
</div>
<div class="flex flex-col gap-sm" id="card-details">
<div>
<label class="block text-label-md font-label-md text-secondary mb-xs">카드사 선택</label>
<select class="w-full border-surface-variant rounded-lg bg-surface-container-lowest text-body-sm font-body-sm focus:ring-1 focus:ring-primary-container focus:border-primary-container h-[36px]">
<option>신한카드</option>
<option>국민카드</option>
<option>현대카드</option>
<option>삼성카드</option>
<option>기타</option>
</select>
</div>
<div>
<label class="block text-label-md font-label-md text-secondary mb-xs">할부기간</label>
<select class="w-full border-surface-variant rounded-lg bg-surface-container-lowest text-body-sm font-body-sm focus:ring-1 focus:ring-primary-container focus:border-primary-container h-[36px]">
<option>일시불</option>
<option>2개월 무이자</option>
<option>3개월 무이자</option>
<option>6개월</option>
</select>
</div>
</div>
</section>
<section class="bg-surface-container-lowest border border-surface-variant rounded-xl p-md shadow-sm">

</div>
<div class="flex-1">
<label class="block text-label-md font-label-md text-secondary mb-xs">연락처</label>
<input class="w-full border-surface-variant rounded-lg bg-surface-container-lowest text-body-sm font-body-sm focus:ring-1 focus:ring-primary-container focus:border-primary-container h-[36px]" readonly="" type="tel" value="010-1234-5678"/>
</div>
</div>
<div>
<label class="block text-label-md font-label-md text-secondary mb-xs">이메일</label>
<input class="w-full border-surface-variant rounded-lg bg-surface-container-lowest text-body-sm font-body-sm focus:ring-1 focus:ring-primary-container focus:border-primary-container h-[36px]" readonly="" type="email" value="hong@sellersuite.kr"/>
</div>
</div>
</section>
</div>
<div class="w-full lg:w-1/3">
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-md shadow-sm sticky top-md">
<h2 class="text-headline-sm font-headline-sm mb-sm pb-xs border-b border-surface-variant">주문 요약</h2>
<div class="flex flex-col gap-sm mb-md">
<div class="flex justify-between items-start">
<div>
<p class="text-body-sm font-body-sm font-medium text-on-surface">SellerSuite Pro 플랜 (연간)</p>
<p class="text-label-sm font-label-sm text-secondary mt-1">1 x ₩1,200,000</p>
</div>
<p class="text-body-sm font-body-sm text-on-surface">₩1,200,000</p>
</div>
</div>
<div class="border-t border-surface-variant pt-sm mb-md">
<div class="flex justify-between items-center mb-xs">
<span class="text-body-sm font-body-sm text-secondary">상품 금액</span>
<span class="text-body-sm font-body-sm text-on-surface">₩1,200,000</span>
</div>
<div class="flex justify-between items-center mb-xs">
<span class="text-body-sm font-body-sm text-secondary">할인</span>
<span class="text-body-sm font-body-sm text-on-error-container">- ₩120,000</span>
</div>
<div class="flex justify-between items-center">
<span class="text-body-sm font-body-sm text-secondary">부가세 (10%)</span>
<span class="text-body-sm font-body-sm text-on-surface">₩108,000</span>
</div>
</div>
<div class="border-t-2 border-on-surface pt-sm mb-md flex justify-between items-end">
<span class="text-body-md font-body-md font-semibold text-on-surface">총 결제 금액</span>
<span class="text-headline-lg font-headline-lg text-primary">₩1,188,000</span>
</div>
<div class="flex items-start gap-xs mb-lg bg-surface p-sm rounded-lg border border-surface-variant">
<input class="mt-1 border-outline-variant text-primary-container focus:ring-primary-container rounded" id="terms" type="checkbox"/>
<label class="text-label-md font-label-md text-secondary cursor-pointer leading-tight" for="terms">
                            결제 조건 및 <a class="text-primary hover:underline" href="#">서비스 약관</a>, <a class="text-primary hover:underline" href="#">개인정보 처리방침</a>에 동의합니다. (필수)
                        </label>
</div>
<button class="w-full bg-primary-container text-on-primary h-[48px] rounded-lg text-body-md font-body-md font-medium hover:bg-primary transition-colors flex items-center justify-center shadow-sm">
                        결제하기
                    </button>
<p class="text-label-sm font-label-sm text-secondary text-center mt-sm flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[14px]" data-icon="lock">lock</span>
                        안전하게 암호화되어 결제됩니다.
                    </p>
</div>
</div>
</div>
</main>
<script>
        const radioButtons = document.querySelectorAll('input[name="payment_method"]');
        
        radioButtons.forEach(radio => {
            radio.addEventListener('change', (e) => {
                
                document.querySelectorAll('input[name="payment_method"]').forEach(r => {
                    const label = r.closest('label');
                    if (r.checked) {
                        label.classList.remove('border-surface-variant', 'bg-surface-container-lowest');
                        label.classList.add('border-primary-container', 'bg-surface');
                        label.querySelector('.material-symbols-outlined').classList.remove('text-secondary');
                        label.querySelector('.material-symbols-outlined').classList.add('text-primary');
                    } else {
                        label.classList.add('border-surface-variant', 'bg-surface-container-lowest');
                        label.classList.remove('border-primary-container', 'bg-surface');
                        label.querySelector('.material-symbols-outlined').classList.add('text-secondary');
                        label.querySelector('.material-symbols-outlined').classList.remove('text-primary');
                    }
                });

                
                const cardDetails = document.getElementById('card-details');
                if (e.target.value === 'card') {
                    cardDetails.style.display = 'flex';
                } else {
                    cardDetails.style.display = 'none';
                }
            });
        });
    </script>
