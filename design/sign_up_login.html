<script>
        function toggleView(view) {
            const tabLogin = document.getElementById('tab-login');

            const fieldName = document.getElementById('field-name');
            const linkForgotPw = document.getElementById('link-forgot-password');

            // Reset tabs
            tabLogin.className = "flex-1 py-3 text-center font-label-md text-label-md transition-colors text-secondary hover:text-on-surface border-b-2 border-transparent cursor-pointer";
            tabSignup.className = "flex-1 py-3 text-center font-label-md text-label-md transition-colors text-secondary hover:text-on-surface border-b-2 border-transparent cursor-pointer";

            if (view === 'login') {
                tabLogin.className = "flex-1 py-3 text-center font-label-md text-label-md transition-colors bg-surface-container-lowest border-b-2 border-primary text-primary";
                fieldName.style.display = 'none';
                linkForgotPw.style.display = 'block';
                btnSubmit.textContent = 'лЎңк·ёмқё';
                subtitle.textContent = 'мқҙм»ӨлЁёмҠӨ кҙҖлҰ¬лҘј мң„н•ң мөңм Ғмқҳ мҶ”лЈЁм…ҳ';
